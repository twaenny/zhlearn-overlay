<!doctype html>
<html lang="de-CH">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZHlearn · Reviewer-Walkthrough</title>
  <link rel="icon" href="/build/favicon-48.png" />
  <style>
    html, body { margin: 0; height: 100%; background: #f4f4f4; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', system-ui, sans-serif; color: #4a4a4a;
    }
    .launcher { text-align: center; }
    .launcher p { margin: 0; font-size: 13px; }
    .launcher a { color: #0070b4; }
  </style>
</head>
<body>
  <div class="launcher">
    <p>Wird zum Walkthrough weitergeleitet…</p>
    <p style="margin-top:8px"><a href="/index.html">Übersicht</a></p>
  </div>
  <script>
    (async () => {
      // /walkthrough/        → step 1 (Discovery, lernplatz.html).
      // /walkthrough/#step-N → step N's first file.
      // Unknown / roadmap-only → upstream /index.html (overview).
      const hash = location.hash.match(/^#step-(\d+)$/);
      const wantedId = hash ? hash[1] : '1';
      try {
        const md = await fetch('/DEMO-FLOW.md', { cache: 'no-cache' }).then(r => r.text());
        const headingRe = /^### Step (\d+)(?:\s*·\s*)?(.*?)$/gm;
        for (const m of md.matchAll(headingRe)) {
          if (m[1] !== wantedId) continue;
          const files = [...m[2].matchAll(/`([^`]+\.html)`/g)].map(x => x[1]);
          if (files.length) { location.replace('/' + files[0]); return; }
          location.replace('/index.html'); return;
        }
        location.replace('/index.html');
      } catch {
        location.replace('/index.html');
      }
    })();
  </script>
</body>
</html>
