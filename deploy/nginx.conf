server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    sendfile on;
    tcp_nopush on;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 512;

    # NB: do NOT add a server-level `types { ... }` block — it REPLACES the
    # default mime-types table inherited from the http context, so HTML/JS/
    # CSS/woff2 all collapse to application/octet-stream and the browser
    # downloads them instead of rendering. The wizard fetches DEMO-FLOW.md
    # via JS .text(), so the .md mime type is irrelevant.

    # Inject Bugherd + the reviewer-walkthrough overlay into EVERY HTML
    # response (prototype screens and the /walkthrough/ launcher alike).
    # The wizard is now an in-page overlay rather than an iframe wrapper,
    # so it must ride on every upstream HTML page. Two sub_filter lines:
    # the first inserts the wizard <link>/<script>, the second inserts
    # Bugherd. Both fire on every `</head>` (sub_filter_once off).
    sub_filter '</head>' '<link rel="stylesheet" href="/walkthrough/wizard.css"><script src="/walkthrough/wizard.js" defer></script><script type="text/javascript" src="https://www.bugherd.com/sidebarv2.js?apikey=ljzxevm8w1eehyldcpwh9g" async="true"></script></head>';
    sub_filter_once on;

    # Walkthrough overlay lives in a separate bind-mount (/srv/walkthrough).
    # `^~` forces this prefix to beat the regex locations below, so the
    # alias actually gets used for HTML/CSS/JS inside /walkthrough/.
    location ^~ /walkthrough/ {
        alias /srv/walkthrough/;
        try_files $uri $uri/ =404;

        # Walkthrough chrome HTML: don't cache so edits go live on reload.
        location ~* \.html$ {
            add_header Cache-Control "no-store";
        }
    }

    # Upstream renamed lernplatz.html → lernplatz-intern.html (+ new
    # lernplatz-extern.html) on 2026-05-27. Preserve the old URL so
    # wizard Step 1 (still references lernplatz.html via DEMO-FLOW.md),
    # bookmarks and any stale links resolve. Default to the intern
    # variant — that's the one wired into the Marc-Steiner persona.
    location = /lernplatz.html {
        absolute_redirect off;
        return 302 /lernplatz-intern.html;
    }

    # Numeric shortcut: /7 (or /7/) → /walkthrough/#step-7, then the
    # launcher resolves to the real HTML file via DEMO-FLOW.md lookup.
    # Must come before the regex `\.html$` and `\.(woff2|…)$` blocks
    # since regex locations match in declaration order.
    # absolute_redirect off keeps the Location header as a relative
    # path (Traefik terminates TLS, so $scheme inside nginx is `http`
    # and we don't want browsers to downgrade out of HTTPS).
    location ~ ^/([0-9]+)/?$ {
        absolute_redirect off;
        return 302 /walkthrough/#step-$1;
    }

    # Bugherd API proxy for the overview page. The browser hits
    # /api/bugherd/<path>; we forward to www.bugherd.com/api_v2/<path>
    # and inject the Authorization header from a separate file. The
    # auth file is git-ignored — only present where the API key lives.
    # See tools/bugherd-auth.conf.example for setup instructions.
    # If the auth file is missing, nginx falls back to an empty include
    # so requests just return 401 (overview shows "nicht konfiguriert").
    location /api/bugherd/ {
        proxy_pass https://www.bugherd.com/api_v2/;
        proxy_ssl_server_name on;
        proxy_set_header Host www.bugherd.com;
        include /etc/nginx/conf.d/bugherd-auth.snippet*;
    }

    # Friendly URLs on the prototype root: serve .html when extension is
    # omitted, fall through to 404.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # woff2 + brand assets (prototype root): long cache, immutable.
    location ~* \.(woff2|woff|ttf|otf|png|jpg|jpeg|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Prototype HTML: no caching so srmedia/overlay edits go live immediately.
    location ~* \.html$ {
        add_header Cache-Control "no-store";
    }

    # Health probe.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }
}
