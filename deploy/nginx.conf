server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    sendfile on;
    tcp_nopush on;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 512;

    # NB: do NOT add a server-level `types { ... }` block — it REPLACES the
    # default mime-types table inherited from the http context, so HTML/JS/
    # CSS/woff2 all collapse to application/octet-stream and the browser
    # downloads them instead of rendering. The wizard fetches DEMO-FLOW.md
    # via JS .text(), so the .md mime type is irrelevant.

    # Walkthrough overlay lives in a separate bind-mount (/srv/walkthrough).
    # `^~` forces this prefix to beat the regex locations below, so the
    # alias actually gets used for HTML/CSS/JS inside /walkthrough/.
    location ^~ /walkthrough/ {
        alias /srv/walkthrough/;
        try_files $uri $uri/ =404;

        # Walkthrough chrome HTML: don't cache so edits go live on reload.
        location ~* \.html$ {
            add_header Cache-Control "no-store";
        }
    }

    # Friendly URLs on the prototype root: serve .html when extension is
    # omitted, fall through to 404.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # woff2 + brand assets (prototype root): long cache, immutable.
    location ~* \.(woff2|woff|ttf|otf|png|jpg|jpeg|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Prototype HTML: no caching so srmedia/overlay edits go live immediately.
    location ~* \.html$ {
        add_header Cache-Control "no-store";
    }

    # Health probe.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }
}
