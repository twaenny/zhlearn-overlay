# zhlearn-overlay — Docker Compose for the preview deployment.
#
# Serves the static ZHlearn prototype (read-only bind-mount of the
# upstream clone) PLUS the reviewer-walkthrough overlay (bind-mount of
# the overlay's `walkthrough/` directory layered onto the same nginx
# root). The ZHlearn clone stays byte-for-byte identical to
# upstream/main — none of this overlay's files live inside it.
#
# Layout assumed by the host bind paths:
#   ~/projects/platform/tools/zhlearn/          (upstream Digital4Health/ZHlearn)
#   ~/projects/platform/tools/zhlearn-overlay/  (this repo)
#
# Bind-mount sources use the HOST-side path of the coder-ops-home
# Docker volume — the workspace's /home/coder/... paths don't exist on
# the Docker daemon's filesystem. Same pattern as dev-pmaid's mounts.

services:
  app:
    image: nginx:1.27-alpine
    container_name: ai-zhlearn
    restart: unless-stopped
    networks: [ ai-proxy ]
    volumes:
      # 1. upstream prototype — strictly read-only, no diff against Digital4Health/ZHlearn.
      #    Mounted at the nginx default root.
      - /var/lib/docker/volumes/coder-ops-home/_data/projects/platform/tools/zhlearn:/usr/share/nginx/html:ro
      # 2. walkthrough overlay — separate mount point. nginx.conf exposes it
      #    at the /walkthrough/ URL via an `alias` directive. Keeping the
      #    walkthrough outside /usr/share/nginx/html means mount #1 stays :ro
      #    without monkey-patching the upstream tree to host a sub-mountpoint.
      - /var/lib/docker/volumes/coder-ops-home/_data/projects/platform/tools/zhlearn-overlay/walkthrough:/srv/walkthrough:ro
      # 3. nginx site config (from this repo).
      #    Mount the parent DIRECTORY (not the single file) — single-file
      #    bind-mounts pin a specific inode, and most editors save by
      #    atomic-replace (write tempfile → rename), which gives the new
      #    file a different inode. The container would then keep serving
      #    a stale snapshot until restart. Directory mount tracks the path.
      - /var/lib/docker/volumes/coder-ops-home/_data/projects/platform/tools/zhlearn-overlay/deploy:/etc/nginx/conf.d:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ai-proxy"
      - "traefik.http.routers.zhlearn.rule=Host(`zhlearn.ai.srmedia.ch`)"
      - "traefik.http.routers.zhlearn.entrypoints=websecure"
      - "traefik.http.routers.zhlearn.tls=true"
      - "traefik.http.routers.zhlearn.tls.certresolver=le"
      - "traefik.http.routers.zhlearn.tls.domains[0].main=ai.srmedia.ch"
      - "traefik.http.routers.zhlearn.tls.domains[0].sans=*.ai.srmedia.ch"
      - "traefik.http.services.zhlearn.loadbalancer.server.port=80"

  # Auto-pull: polls upstream Digital4Health/ZHlearn every 120s and
  # fast-forwards the local clone if main has new commits. Uses the
  # workspace user's stored git credentials (mounted read-only) and
  # runs as UID 1000 so any new files arrive with the same owner as
  # the rest of the repo. New content goes live immediately — nginx
  # bind-mounts the repo and HTML responses are `Cache-Control: no-store`.
  auto-pull:
    image: alpine/git:latest
    container_name: ai-zhlearn-autopull
    restart: unless-stopped
    user: "1000:1000"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Copy mounted creds into a writable HOME so the `store` helper
        # can refresh credentials without trying to write to the read-only
        # source mounts.
        mkdir -p /tmp/githome;
        cp /tmp/seed/.git-credentials /tmp/githome/.git-credentials;
        cp /tmp/seed/.gitconfig       /tmp/githome/.gitconfig;
        chmod 600 /tmp/githome/.git-credentials;
        export HOME=/tmp/githome;
        echo "auto-pull started (interval 120s, repo=/repo)";
        while true; do
          out=$$(git -C /repo pull --ff-only 2>&1) || true;
          case "$$out" in
            *"Already up to date"*) : ;;
            *) echo "[$$(date -u +%FT%TZ)] $$out" ;;
          esac;
          sleep 120;
        done
    environment:
      HOME: /tmp/githome
    volumes:
      - /var/lib/docker/volumes/coder-ops-home/_data/projects/platform/tools/zhlearn:/repo
      - /var/lib/docker/volumes/coder-ops-home/_data/.git-credentials:/tmp/seed/.git-credentials:ro
      - /var/lib/docker/volumes/coder-ops-home/_data/.gitconfig:/tmp/seed/.gitconfig:ro

networks:
  ai-proxy:
    external: true
